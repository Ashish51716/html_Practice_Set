<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Bootstrap Form Template</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5f5f5;
}
.form-container{
    max-width:1200px;
    margin:30px auto;
}
h2{
    text-align:center;
    font-weight:bold;
    margin-bottom:40px;
}
.form-control{
    margin-bottom:20px;
    height:25px;
    font-size:15px;
}
textarea.form-control{
    height:60px;
}
</style>
</head>

<body>

<div class="container form-container">

    <h2>Registration Bootstrap Form Template</h2>

    <form>

        <input type="text" class="form-control" placeholder="FIRST NAME">

        <input type="text" class="form-control" placeholder="LAST NAME">

        <div class="row">
            <div class="col-md-4">
                <input type="text" class="form-control" placeholder="PHONE NUMBER..">
            </div>
        </div>

        <input type="text" class="form-control" placeholder="COUNTRY..">

        <input type="text" class="form-control" placeholder="ADDRESS..">

        <div class="row">
            <div class="col-md-8">
                <input type="text" class="form-control" placeholder="CITY">
            </div>

            <div class="col-md-4">
                <input type="text" class="form-control" placeholder="PIN CODE">
            </div>
        </div>

        <textarea class="form-control" placeholder="ABOUT YOURSELF..."></textarea>

        <input type="email" class="form-control" placeholder="YOUR EMAIL....">

        <input type="email" class="form-control" placeholder="CONFIRM YOUR EMAIL...">

        <div class="row">
            <div class="col-md-6">
                <input type="password" class="form-control" placeholder="PASSWORD">
            </div>

            <div class="col-md-6">
                <input type="password" class="form-control" placeholder="CONFIRM PASSWORD">
            </div>
        </div>
<button>Reset</button>
<button>Submit</button>
    </form>

</div>

</body>
</html>
