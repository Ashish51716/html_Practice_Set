<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        table{
            border: 1px solid black;
        }
        td{
            border: 1px solid black;
            text-align: center;
            width: 70px;
            height: 70px;
        }
    </style>
</head>
<body>
    <table >
        <caption><h1>Calculator</h1></caption>
        <tr style="background-color: gray;">
            <td>Red</td>
            <td>deg</td>
            <td>x!</td>
            <td>(</td>
            <td>)</td>
            <td>%</td>
            <td style="background-color: gray;"><b>AC</b></td>
        </tr>
        <tr>
            <td>Inv</td>
            <td>sin</td>
            <td>In</td>
            <td>7</td>
            <td>8</td>
            <td>9</td>
            <td style="background-color: gray;">-:-</td>
        </tr>

        <tr>
            <td>3.14</td>
            <td>cos</td>
            <td>log</td>
            <td>4</td>
            <td>5</td>
            <td>6</td>
            <td style="background-color: gray;">X</td>
        </tr>

        <tr>
            <td>e</td>
            <td>tan</td>
            <td>v</td>
            <td>1</td>
            <td>2</td>
            <td>3</td>
            <td style="background-color: gray;">-</td>
        </tr>

        <tr>
            <td>Ans</td>
            <td>Exp</td>
            <td>X^y</td>
            <td>0</td>
            <td>.</td>
            <td>+</td>
            <td style="background-color: aqua;">=</td>
        </tr>
    </table>
</body>
</html>
