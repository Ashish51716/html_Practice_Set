<!DOCTYPE html>
<html>
<head>
    <title>Image Gallery Layout</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            display:flex;
            justify-content:center;
            padding:30px;
            background:#f5f5f5;
        }

        .gallery{
            width:1000px;
            display:grid;
            grid-template-columns:repeat(4, 1fr);
            gap:10px;
        }

        .item{
            background:#d9d9d9;
            border:2px solid #999;
            display:flex;
            justify-content:center;
            align-items:center;
            color:#777;
            font-size:28px;
        }

        .wide{
            grid-column:span 2;
            height:200px;
        }

        .square{
            height:200px;
        }

        .tall{
            grid-row:span 2;
            height:410px;
        }
    </style>
</head>
<body>

<div class="gallery">

    <div class="item wide">400 X 200</div>
    <div class="item tall">200 X 400</div>
    <div class="item square">200 X 200</div>

    <div class="item square">200 X 200</div>
    <div class="item square">200 X 200</div>
    <div class="item square">200 X 200</div>

    <div class="item wide">400 X 200</div>
    <div class="item square">200 X 200</div>
    <div class="item square">200 X 200</div>

    <div class="item tall">200 X 400</div>
    <div class="item square">200 X 200</div>
    <div class="item wide">400 X 200</div>

    <div class="item square">200 X 200</div>
    <div class="item square">200 X 200</div>
    <div class="item square">200 X 200</div>

</div>

</body>
</html>
