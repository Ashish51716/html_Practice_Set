<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrstion form</title>
</head>
<body>
    <h2>Registration Form</h2>

    <form>
      
        First Name:<input type="text" style="margin-left: 50px;"><br><br>
        Last Name:<input type="text" style="margin-left: 50px;"><br><br>
        Email Name:<input type="email" style="margin-left: 40px;"><br><br>
        Password:<input type="password" style="margin-left: 60px;"><br><br>
        Confirm Password:<input type="password" style="margin-left: 5px;"><br><br>
        Date of Birth:<input type="date" style="margin-left: 40px;"><br><br>
        Gender: <input type="radio" name="gender" style="margin-left: 70px;"> Male
                <input type="radio" name="gender"> Female
                <input type="radio" name="gender"> Other
                <br><br>
        Phone Number:<input type="tel" style="margin-left: 30px;"><br><br>
    
        Address:<textarea rows="6"  style="margin-left: 70px;"></textarea><br><br>

       Country:            <Select style="margin-left: 70px;">
                           <option>Select Country</option>
                           <option>India</option>
                           <option>USA</option>
                           <option>Austrelia</option>
                           <option>Pakistan</option>
                           </Select>
<br><br>
                           <button style="margin-left: 90px;">Register</button>
                           <button>Reset</button>
    
    </form>
</body>
</html>
